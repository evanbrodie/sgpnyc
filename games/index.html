<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games — SGP International</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a3557;
      --blue-heading: #1d4e7a;
      --green: #3d8a4e;
      --green-hover: #2e6e3c;
      --bg-light: #e8e5df;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-light); color: #1a1a1a; min-height: 100vh; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 70px;
      background: rgba(20,20,20,0.88); backdrop-filter: blur(8px);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 38px; filter: brightness(0) invert(1); }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { color: #fff; text-decoration: none; font-size: 14px; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 0.7; }
    .nav-cta { background: var(--green); color: #fff !important; padding: 10px 22px; border-radius: 30px; font-weight: 500 !important; }
    .nav-cta:hover { background: var(--green-hover) !important; opacity: 1 !important; }

    /* GAMES CONTENT */
    .games-container {
      padding-top: 130px;
      padding-bottom: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-title {
      font-size: 28px;
      font-weight: 400;
      color: var(--green);
      margin-bottom: 24px;
      align-self: center;
    }

    .game-embed {
      width: 100%;
      max-width: 440px;
      aspect-ratio: 440 / 210;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      background: #000;
    }

    /* If the game is an iframe, swap the img for an iframe with the correct src */
    .game-embed img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* FOOTER */
    footer {
      background: #1a1a1a; color: #888;
      text-align: center; padding: 24px 40px; font-size: 13px;
    }
  
    .has-dropdown { position: relative; }
    .dropdown-btn {
      background: none; border: none; color: #fff;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      font-weight: 400; cursor: pointer;
      display: flex; align-items: center; gap: 5px; padding: 0;
      transition: opacity 0.2s;
    }
    .dropdown-btn:hover { opacity: 0.7; }
    .dropdown-btn .arrow { font-size: 12px; transition: transform 0.2s; display: inline-block; }
    .dropdown-menu {
      display: none; position: absolute; top: calc(100% + 16px); left: 0;
      background: rgba(20,20,20,0.96); border-radius: 4px;
      list-style: none; min-width: 180px; padding: 8px 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 200;
    }
    .has-dropdown:hover .dropdown-menu,
    .has-dropdown:focus-within .dropdown-menu { display: block; }
    .has-dropdown:hover .arrow { transform: rotate(180deg); }
    .dropdown-menu li a {
      display: block; padding: 10px 20px; color: #fff;
      text-decoration: none; font-size: 13px; transition: background 0.15s;
    }
    .dropdown-menu li a:hover { background: rgba(255,255,255,0.1); opacity: 1; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/sgpnyc/">
    <img src="/sgpnyc/images/site/sgpGlobe.webp" alt="SGP International" />
  </a>
    <ul class="nav-links">
    <li><a href="/sgpnyc/">Home</a></li>
    <li class="has-dropdown">
      <button class="dropdown-btn">SGP International <span class="arrow">&#8964;</span></button>
      <ul class="dropdown-menu">
        <li><a href="/sgpnyc/abt/">About SGP</a></li>
        <li><a href="/sgpnyc/services/">Services</a></li>
        <li><a href="/sgpnyc/products/">Products</a></li>
        <li><a href="/sgpnyc/success/">Success Stories</a></li>
        <li><a href="/sgpnyc/partners/">Customers</a></li>
        <li><a href="/sgpnyc/new-page/">Personal Paper</a></li>
      </ul>
    </li>
    <li><a href="/sgpnyc/blog/">Blog</a></li>
    <li><a href="/sgpnyc/games/">Games</a></li>
    <li><a href="/sgpnyc/#contact" class="nav-cta">Contact</a></li>
  </ul>
</nav>

<div class="games-container">
  <h2 class="game-title">SGP Pants Run</h2>
  <div class="game-embed">
    <!--
      If the game is an iframe, replace the img below with:
      <iframe src="GAME_URL_HERE" allowfullscreen></iframe>

      If it's a static screenshot linking to a game, keep the img and wrap in an <a>.
    -->
    <img
      src="../images/site/NYC.jpg"
      alt="SGP Pants Run game"
      onerror="this.src='https://placehold.co/440x210/0a0a2e/ffffff?text=SGP+Pants+Run'" />
  </div>
</div>

<footer>
  <p>©SGP International</p>
</footer>

</body>
</html>
