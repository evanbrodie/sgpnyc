<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Paper — SGP International</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue-heading: #1d4e7a; --green: #3d8a4e; --green-hover: #2e6e3c; }
    body { font-family: 'DM Sans', sans-serif; background: #f4f3f1; color: #1a1a1a; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 70px; background: rgba(20,20,20,0.88); backdrop-filter: blur(8px); }
    .nav-logo img { height: 38px; filter: brightness(0) invert(1); }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { color: #fff; text-decoration: none; font-size: 14px; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 0.7; }
    .nav-cta { background: var(--green); color: #fff !important; padding: 10px 22px; border-radius: 30px; font-weight: 500 !important; }
    .nav-cta:hover { background: var(--green-hover) !important; opacity: 1 !important; }
    .has-dropdown { position: relative; }
    .dropdown-btn { background: none; border: none; color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 0; }
    .arrow { font-size: 12px; transition: transform 0.2s; display: inline-block; }
    .dropdown-menu { display: none; position: absolute; top: calc(100% + 16px); left: 0; background: rgba(20,20,20,0.96); border-radius: 4px; list-style: none; min-width: 180px; padding: 8px 0; box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 200; }
    .has-dropdown:hover .dropdown-menu, .has-dropdown:focus-within .dropdown-menu { display: block; }
    .has-dropdown:hover .arrow { transform: rotate(180deg); }
    .dropdown-menu li a { display: block; padding: 10px 20px; color: #fff; text-decoration: none; font-size: 13px; }
    .dropdown-menu li a:hover { background: rgba(255,255,255,0.1); }

    .content { max-width: 960px; margin: 0 auto; padding: 120px 60px 100px; }

    .intro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-bottom: 70px;
    }

    .intro-image {
      width: 100%;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }

    .intro-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 400;
      color: var(--blue-heading);
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .intro-text p {
      font-size: 15px;
      line-height: 1.75;
      color: #555;
    }

    .press-section h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .press-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .press-item {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .press-item img {
      width: 100%;
      display: block;
    }

    .press-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: #e8e5df;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .press-placeholder span {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-align: center;
      padding: 10px;
      letter-spacing: 0.04em;
    }

    footer { background: #1a1a1a; color: #888; text-align: center; padding: 24px 40px; font-size: 13px; margin-top: 40px; }

    @media (max-width: 700px) {
      .intro-grid { grid-template-columns: 1fr; }
      .press-grid { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 100px 24px 60px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/sgpnyc/"><img src="/sgpnyc/images/site/sgpGlobe.webp" alt="SGP International" /></a>
  <ul class="nav-links">
    <li><a href="/sgpnyc/">Home</a></li>
    <li class="has-dropdown">
      <button class="dropdown-btn">SGP International <span class="arrow">&#8964;</span></button>
      <ul class="dropdown-menu">
        <li><a href="/sgpnyc/abt/">About SGP</a></li>
        <li><a href="/sgpnyc/services/">Services</a></li>
        <li><a href="/sgpnyc/products/">Products</a></li>
        <li><a href="/sgpnyc/success/">Success Stories</a></li>
        <li><a href="/sgpnyc/partners/">Customers</a></li>
        <li><a href="/sgpnyc/new-page/">Personal Paper</a></li>
      </ul>
    </li>
    <li><a href="/sgpnyc/blog/">Blog</a></li>
    <li><a href="/sgpnyc/games/">Games</a></li>
    <li><a href="/sgpnyc/#contact" class="nav-cta">Contact</a></li>
  </ul>
</nav>

<div class="content">
  <div class="intro-grid">
    <div>
      <img class="intro-image"
        src="../images/site/personalPaper.png"
        alt="Personal Paper — Custom Windows Wallpaper"
        onerror="this.style.background='#3a1a6e';this.style.aspectRatio='1';this.removeAttribute('src')" />
    </div>
    <div class="intro-text">
      <h1>Personal Paper was introduced in 1993.</h1>
      <p>It was the only PC application that allowed you to customize your PC desktop!</p>
    </div>
  </div>

  <div class="press-section">
    <h2>As seen in</h2>
    <div class="press-grid">
      <div class="press-item">
        <img src="../images/site/NYTimes.jpg" alt="New York Times" style="width:100%;display:block;border-radius:4px" />
      </div>
      <div class="press-item">
        <img src="../images/site/WashingtonPost.jpg" alt="Washington Post" style="width:100%;display:block;border-radius:4px" />
      </div>
      <div class="press-item">
        <img src="../images/site/ChicagoTrib.jpg" alt="Chicago Tribune" style="width:100%;display:block;border-radius:4px" />
      </div>
      <div class="press-item">
        <img src="../images/site/PCNovice.jpg" alt="PC Novice" style="width:100%;display:block;border-radius:4px" />
      </div>
    </div>
  </div>
</div>

<footer><p>©SGP International</p></footer>
</body>
</html>
